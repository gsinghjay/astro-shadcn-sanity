name = "ywcc-event-reminders"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 9 * * *"]  # Daily at 9am UTC

[[d1_databases]]
binding = "DB"
database_name = "ywcc-capstone-portal"
database_id = "76887418-c356-46d8-983b-fa6e395d8b16"

[vars]
SANITY_PROJECT_ID = "49nk9b0w"
SANITY_DATASET = "production"

# Secrets (set via `npx wrangler secret put`):
# SANITY_API_TOKEN — read-only Sanity API token
# DISCORD_WEBHOOK_URL — Discord channel webhook URL
# RESEND_API_KEY — same key used by Astro app
# RESEND_FROM_EMAIL — sender address for reminder emails
