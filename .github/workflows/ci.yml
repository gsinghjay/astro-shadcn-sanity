name: CI

on:
  pull_request:
    branches: [preview]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify test tier boundaries (no Astro Container leaks into unit-node)
        run: npm run verify:tiers --workspace=astro-app
      - name: Run unit tests (per-tier sequential to bound CI memory)
        run: npm run test:unit:ci --workspace=astro-app

  site-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Seed placeholder secrets for miniflare prerender
        # The Astro 6 / @astrojs/cloudflare v13 prerender runs the bundled Worker
        # under miniflare, which reads .dev.vars for its Worker env. Shell-level
        # env vars on the build step don't reach that runtime, so astro:env/server
        # re-validates inside miniflare and fails on missing secrets. Seeding
        # placeholders into .dev.vars satisfies validateSecrets for CI builds
        # (real prod secrets stay dashboard-managed).
        run: |
          cat > astro-app/.dev.vars <<'EOF'
          BETTER_AUTH_SECRET=ci-placeholder-better-auth-secret
          GITHUB_CLIENT_SECRET=ci-placeholder-github-client-secret
          GOOGLE_CLIENT_ID=ci-placeholder-google-client-id
          GOOGLE_CLIENT_SECRET=ci-placeholder-google-client-secret
          RESEND_API_KEY=ci-placeholder-resend-api-key
          TURNSTILE_SECRET_KEY=ci-placeholder-turnstile-secret
          SANITY_API_WRITE_TOKEN=ci-placeholder-sanity-write-token
          EOF
      - name: Build Astro site
        run: npm run build --workspace=astro-app
        env:
          PUBLIC_SANITY_STUDIO_PROJECT_ID: ${{ vars.PUBLIC_SANITY_STUDIO_PROJECT_ID }}
          PUBLIC_SANITY_STUDIO_DATASET: ${{ vars.PUBLIC_SANITY_STUDIO_DATASET }}
          PUBLIC_SANITY_DATASET: ${{ vars.PUBLIC_SANITY_DATASET || 'production' }}
          PUBLIC_SITE_ID: ${{ vars.PUBLIC_SITE_ID || 'capstone' }}
          PUBLIC_SITE_THEME: ${{ vars.PUBLIC_SITE_THEME || 'red' }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_SANITY_STUDIO_URL: ${{ vars.PUBLIC_SANITY_STUDIO_URL }}
          PUBLIC_GTM_ID: ${{ vars.PUBLIC_GTM_ID }}
          PUBLIC_SANITY_VISUAL_EDITING_ENABLED: ${{ vars.PUBLIC_SANITY_VISUAL_EDITING_ENABLED }}
          BETTER_AUTH_SECRET: ci-placeholder-better-auth-secret
          GITHUB_CLIENT_SECRET: ci-placeholder-github-client-secret
          GOOGLE_CLIENT_ID: ci-placeholder-google-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-google-client-secret
          RESEND_API_KEY: ci-placeholder-resend-api-key
          TURNSTILE_SECRET_KEY: ci-placeholder-turnstile-secret
          SANITY_API_WRITE_TOKEN: ci-placeholder-sanity-write-token
      - name: Serve built site
        run: npx --yes http-server astro-app/dist -p 4321 --silent &
      - name: Wait for server
        run: npx --yes wait-on http://localhost:4321
      - name: Run Lighthouse CI (sitemap URL set)
        run: npx lhci autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Run Pa11y CI (sitemap URL set)
        run: npx --yes pa11y-ci --config .pa11yci.cjs
        continue-on-error: true
